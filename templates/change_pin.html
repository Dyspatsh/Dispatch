{% extends "base.html" %}

{% block title %}Change PIN{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Change PIN</h1>
    
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    
    {% if success %}
    <div class="success">{{ success }}</div>
    <div class="return-link">
        <a href="/profile" class="btn btn-primary">Return to Settings</a>
    </div>
    {% else %}
    <form method="post" action="/profile/change-pin">
        <div class="form-group">
            <label for="current_pin">Current PIN (6 digits)</label>
            <input type="password" id="current_pin" name="current_pin" maxlength="6" pattern="[0-9]{6}" required>
        </div>
        
        <div class="form-group">
            <label for="new_pin">New PIN (6 digits)</label>
            <input type="password" id="new_pin" name="new_pin" maxlength="6" pattern="[0-9]{6}" required>
        </div>
        
        <div class="form-group">
            <label for="confirm_pin">Confirm New PIN</label>
            <input type="password" id="confirm_pin" name="confirm_pin" maxlength="6" pattern="[0-9]{6}" required>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update PIN</button>
            <a href="/profile" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
    {% endif %}
</div>

<script>
    const form = document.querySelector('form');
    if (form) {
        form.addEventListener('submit', function(e) {
            const newPin = document.getElementById('new_pin').value;
            const confirmPin = document.getElementById('confirm_pin').value;
            if (newPin !== confirmPin) {
                e.preventDefault();
                alert('New PIN and confirm PIN do not match');
            }
            if (newPin.length !== 6 || !/^\d+$/.test(newPin)) {
                e.preventDefault();
                alert('PIN must be exactly 6 digits');
            }
        });
    }
</script>
{% endblock %}
