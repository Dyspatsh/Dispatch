{% extends "base.html" %}

{% block title %}Delete Account{% endblock %}

{% block content %}
<div class="form-container danger-container">
    <h1>Delete Account</h1>
    <p class="warning-text">Warning: This action is permanent and cannot be undone. All your files and data will be permanently deleted.</p>
    
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    
    <form method="post" action="/profile/delete-account">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        
        <div class="form-group">
            <label for="password">Enter your password to confirm</label>
            <input type="password" id="password" name="password" required>
        </div>
        
        <div class="form-group">
            <label for="confirm">Type "DELETE" to confirm</label>
            <input type="text" id="confirm" name="confirm" required>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-danger">Permanently Delete Account</button>
            <a href="/profile" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<script>
    const form = document.querySelector('form');
    if (form) {
        form.addEventListener('submit', function(e) {
            const confirmText = document.getElementById('confirm').value;
            if (confirmText !== 'DELETE') {
                e.preventDefault();
                alert('Please type DELETE to confirm account deletion');
            }
        });
    }
</script>
{% endblock %}
