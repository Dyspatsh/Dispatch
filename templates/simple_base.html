<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="description" content="Dispatch - Privacy-Focused Tor File Sharing Platform">
    <title>{% block title %}Dispatch{% endblock %} - Private Tor File Sharing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dark">
    <nav class="simple-nav">
        <div class="nav-container">
            <a href="/home" class="logo">Dispatch</a>
            {% if user %}
            <div class="user-info" onclick="window.location.href='/profile'">
                <span class="username">{{ user.username }}</span>
                <span class="user-role">{{ user.role }}</span>
            </div>
            {% endif %}
        </div>
    </nav>
    
    <main>
        <div class="return-button-top" style="margin-bottom: 1rem;">
            <a href="/home" class="btn btn-secondary">Return to Home</a>
        </div>
        
        {% block content %}{% endblock %}
        
        <div class="return-button-bottom" style="margin-top: 2rem;">
            <a href="/home" class="btn btn-secondary">Return to Home</a>
        </div>
    </main>
    
    <footer>
        <div class="footer-content">
            <div class="footer-title">Dispatch</div>
            <div class="copyright">2026 Dispatch - All rights reserved</div>
            <div class="version">Version 2.0 - Privacy First</div>
            <div class="contact">Contact: dispatsh@proton.me</div>
        </div>
    </footer>
    
    <script src="/static/script.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
