{% extends "base.html" %}

{% block title %}Password Required{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Password Required</h1>
    <p>The file <strong>{{ filename }}</strong> is password protected.</p>
    
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    
    <form method="get" action="/files/download/{{ file_id }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        
        <div class="form-group">
            <label for="password">File Password</label>
            <input type="password" id="password" name="password" required>
            <small>Enter the password to download this file</small>
        </div>
        <button type="submit" class="btn btn-primary">Download</button>
        <a href="/history" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
